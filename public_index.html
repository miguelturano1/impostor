<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Impostor Party</title>
  <link rel="stylesheet" href="/public_style.css" />
</head>
<body>

  <!-- SCREEN: JOIN -->
  <div class="screen active" id="screenJoin">
    <h1>🕵️ Impostor Party</h1>
    <input id="nameInput" placeholder="Your name" maxlength="24" />
    <input id="roomInput" placeholder="Room code" maxlength="6" />
    <button id="createBtn">Create Room</button>
    <button id="joinBtn" class="secondary">Join Room</button>
    <p id="errorBox" class="error"></p>
  </div>

  <!-- SCREEN: LOBBY -->
  <div class="screen" id="screenLobby">
    <h1>🕵️ Impostor Party</h1>
    <div class="badge" id="roomBadge">ROOM</div>
    <div id="playersList"></div>
    <p class="sub" id="lobbyHint">Waiting for players...</p>
    <button id="startBtn" class="hidden">Start Game</button>
  </div>

  <!-- SCREEN: ROLE REVEAL -->
  <div class="screen" id="screenRole">
    <h2 id="roleBadge">Your Role</h2>
    <div class="infoBox">
      <p class="label">Category</p>
      <p class="value" id="categoryText"></p>
    </div>
    <div class="infoBox">
      <p class="label">Word</p>
      <p class="value" id="wordText"></p>
    </div>
    <button id="roleReadyBtn" class="hidden">Start Clues</button>
    <p class="sub" id="roleWait">Waiting for host...</p>
  </div>

  <!-- SCREEN: CLUE -->
  <div class="screen" id="screenClue">
    <p class="roundTag">Round <span id="roundText">1</span></p>
    <h2>Give a Clue</h2>
    <p class="sub">Turn: <b id="turnText">-</b></p>
    <div id="clueBox" class="hidden">
      <input id="clueInput" placeholder="Type your clue..." maxlength="120" />
      <button id="sendClueBtn">Submit</button>
    </div>
    <p class="sub" id="clueWait">Waiting for current player...</p>
  </div>

  <!-- SCREEN: ROUND END (host picks) -->
  <div class="screen" id="screenRoundEnd">
    <h2>Round Complete</h2>
    <div id="clueSummary"></div>
    <div id="hostPick" class="hidden">
      <button id="nextRoundBtn">Another Round</button>
      <button id="startVoteBtn" class="danger">Start Vote</button>
    </div>
    <p class="sub" id="roundEndWait">Waiting for host...</p>
  </div>

  <!-- SCREEN: VOTE -->
  <div class="screen" id="screenVote">
    <h2>Vote</h2>
    <p class="sub">Who is the impostor?</p>
    <div id="voteList"></div>
    <p class="sub" id="voteProgress"></p>
  </div>

  <!-- SCREEN: RESULT -->
  <div class="screen" id="screenResult">
    <h2 id="resultTitle">Result</h2>
    <p id="resultText"></p>
    <div class="infoBox">
      <p class="label">Category</p>
      <p class="value" id="resultCategory"></p>
    </div>
    <div class="infoBox">
      <p class="label">Word</p>
      <p class="value" id="resultWord"></p>
    </div>
    <div id="tallyBox"></div>
    <button id="playAgainBtn" class="hidden">Play Again</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/public_client.js"></script>
</body>
</html>
